services:
  - type: web
    name: rozanov
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # presne 1 worker: appka drzi data v pameti procesu (SALES apod.),
    # vic workeru by melo kazdy svou kopii a data by se rozjela;
    # vlakna resi soubezne pozadavky (HTML + CSS + obrazky najednou)
    startCommand: gunicorn main:app --workers 1 --threads 8 --bind 0.0.0.0:$PORT
    healthCheckPath: /login
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
      # TODO docasne pro rucni testovani o vikendu (UTC+14 = uz je tam pondeli);
      # po otestovani prepnout na Europe/Prague, jinak se patek odpoledne bude blokovat!
      - key: TZ
        value: Pacific/Kiritimati
      - key: APP_ENV
        value: production
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: APP_DISPLAY_NAME
        sync: false
