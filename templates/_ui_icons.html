{% macro icon(name, class_name='ui-icon') %}
<svg class="{{ class_name }}" viewBox="0 0 24 24" aria-hidden="true">
    {% if name in ['check', 'success'] %}
        <circle cx="12" cy="12" r="9"/><path d="m8 12 2.6 2.6L16.5 9"/>
    {% elif name in ['challenge', 'target'] %}
        <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5"/><path d="m16 8 4-4M17 4h3v3"/>
    {% elif name in ['reward', 'gift'] %}
        <path d="M4 10h16v10H4zM3 7h18v3H3zM12 7v13"/><path d="M12 7H8.5A2.5 2.5 0 1 1 11 4.5L12 7ZM12 7h3.5A2.5 2.5 0 1 0 13 4.5L12 7Z"/>
    {% elif name in ['weekend', 'pause'] %}
        <circle cx="12" cy="12" r="9"/><path d="M9.5 8v8M14.5 8v8"/>
    {% elif name in ['first_sale', 'flag', 'sale'] %}
        <g class="medal-mark">
            <path d="M8.1 3.1c1.8-.7 3.5.2 4.1 2 .6 1.9-.2 4.2-2 5.1-1.8.9-3.9.1-4.5-1.8-.7-2 .5-4.6 2.4-5.3Z"/>
            <path d="M15.6 11.3c1.8-.4 3.4.8 3.7 2.7.4 2.1-.9 4.5-2.9 5.2-1.9.6-3.8-.5-4.1-2.5-.4-2.2 1.2-4.9 3.3-5.4Z"/>
        </g>
    {% elif name in ['five_in_day', 'sales5'] %}
        <g class="medal-mark">
            <path d="m12 3.2 2.1 3.9 4.4.8-3.1 3.2.6 4.4-4-1.9-4 1.9.6-4.4-3.1-3.2 4.4-.8L12 3.2Z"/>
            <circle cx="5" cy="18.2" r="1.7"/><circle cx="12" cy="19.5" r="1.7"/><circle cx="19" cy="18.2" r="1.7"/>
        </g>
    {% elif name in ['quick_pair', 'quick'] %}
        <g class="medal-mark">
            <path fill-rule="evenodd" d="M8.2 5.2a4.8 4.8 0 1 0 0 9.6h2.5v-3H8.2a1.8 1.8 0 1 1 0-3h3.3v-3H8.2Zm7.6 4a4.8 4.8 0 1 1 0 9.6h-3.3v-3h3.3a1.8 1.8 0 1 0 0-3h-2.5v-3h2.5Z"/>
            <rect x="8.5" y="10.5" width="7" height="3" rx="1.5"/>
        </g>
    {% elif name in ['personal_record', 'record'] %}
        <g class="medal-mark">
            <rect x="3.5" y="14" width="4" height="6" rx="1"/>
            <rect x="10" y="10" width="4" height="10" rx="1"/>
            <rect x="16.5" y="5" width="4" height="15" rx="1"/>
            <path d="m12 2.4.8 1.5 1.7.3-1.2 1.2.2 1.7-1.5-.8-1.5.8.2-1.7-1.2-1.2 1.7-.3.8-1.5Z"/>
        </g>
    {% elif name in ['hundred_sales', 'trophy'] %}
        <g class="medal-mark">
            <path d="M8.7 20.7C4.8 18.8 2.9 15.1 3.3 11c.3-3 1.9-5.8 4.4-7.6l1.5 2.1A8 8 0 0 0 6 11.3c-.2 3 1.3 5.8 4 7.1l-1.3 2.3Zm6.6 0-1.3-2.3c2.7-1.3 4.2-4.1 4-7.1a8 8 0 0 0-3.2-5.8l1.5-2.1c2.5 1.8 4.1 4.6 4.4 7.6.4 4.1-1.5 7.8-5.4 9.7Z"/>
            <path d="m12 6.1 1.7 3.4 3.8.6-2.8 2.7.7 3.8-3.4-1.8-3.4 1.8.7-3.8-2.8-2.7 3.8-.6L12 6.1Z"/>
        </g>
    {% elif name in ['morning', 'sun'] %}
        <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/>
    {% elif name in ['late', 'moon'] %}
        <path d="M20 15.2A8 8 0 0 1 8.8 4 8.5 8.5 0 1 0 20 15.2Z"/>
    {% elif name in ['revenue', 'wallet'] %}
        <path d="M4 6h14v14H4z"/><path d="M4 9h16v7h-5a3 3 0 0 1 0-6h5M15 13h.01"/>
    {% elif name in ['average', 'trend'] %}
        <path d="M4 18 9 13l3 3 8-9"/><path d="M15 7h5v5"/>
    {% elif name in ['clients', 'people'] %}
        <circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2"/><path d="M3 20v-2a5 5 0 0 1 10 0v2M14 15a4 4 0 0 1 6 3.5V20"/>
    {% elif name in ['notes', 'note'] %}
        <path d="M5 3h14v18H5z"/><path d="M8 8h8M8 12h8M8 16h5"/>
    {% elif name in ['clock', 'window'] %}
        <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
    {% elif name in ['active_days', 'calendar'] %}
        <rect x="3" y="5" width="18" height="16" rx="2"/><path d="M7 3v4M17 3v4M3 10h18M7 14h2M11 14h2M15 14h2"/>
    {% elif name in ['streak', 'series'] %}
        <path d="M6 18c-2-3 0-6 2-8 0 2 1 3 2 3 0-4 2-7 5-10 0 4 4 6 3 11-.5 4-3 7-7 7-2 0-4-1-5-3Z"/>
    {% elif name in ['best_day', 'star'] %}
        <path d="m12 3 2.7 5.5 6.1.9-4.4 4.3 1 6.1-5.4-2.9-5.4 2.9 1-6.1-4.4-4.3 6.1-.9L12 3Z"/>
    {% else %}
        <circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/>
    {% endif %}
</svg>
{% endmacro %}
